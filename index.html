<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JGA Einkaufsliste</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; }

  .header { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 16px 20px; position: sticky; top: 0; z-index: 10; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .header-title { font-size: 18px; font-weight: 600; }
  .header-sub { font-size: 13px; color: #888; }
  .sync-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #e1f5ee; color: #0f6e56; font-weight: 500; }
  .sync-badge.syncing { background: #faeeda; color: #633806; }
  .sync-badge.error { background: #fcebeb; color: #791f1f; }

  .progress-wrap { margin-top: 8px; }
  .progress-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .progress-track { background: #ececea; border-radius: 4px; height: 5px; overflow: hidden; }
  .progress-fill { height: 100%; background: #1d9e75; border-radius: 4px; transition: width 0.4s; }

  .filter-bar { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 10px 20px; display: flex; gap: 8px; overflow-x: auto; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .fbtn { font-size: 12px; padding: 5px 14px; border-radius: 20px; border: 1px solid #ddd; background: transparent; color: #666; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .fbtn.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }

  .setup-banner { background: #fef9ec; border-bottom: 2px solid #f59e0b; padding: 14px 20px; font-size: 13px; line-height: 1.6; color: #78350f; display: none; }
  .setup-banner strong { font-weight: 600; display: block; margin-bottom: 4px; }
  .setup-banner code { background: #fde68a; padding: 1px 5px; border-radius: 3px; font-family: monospace; font-size: 12px; }

  .list { padding: 12px 0 80px; }
  .section-label { font-size: 11px; font-weight: 600; color: #aaa; letter-spacing: 0.08em; text-transform: uppercase; padding: 16px 20px 6px; }
  .item { display: flex; align-items: center; gap: 14px; padding: 12px 20px; background: #fff; border-bottom: 1px solid #f0f0ee; cursor: pointer; transition: background 0.1s; -webkit-tap-highlight-color: transparent; }
  .item:active { background: #f8f8f6; }
  .item.checked { background: #fafafa; }
  .check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #ccc; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .item.checked .check { background: #1d9e75; border-color: #1d9e75; }
  .check-mark { display: none; width: 10px; height: 7px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg) translateY(-1px); }
  .item.checked .check-mark { display: block; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 15px; color: #1a1a18; transition: color 0.15s; }
  .item.checked .item-name { text-decoration: line-through; color: #bbb; }
  .item-note { font-size: 11px; color: #f59e0b; margin-top: 2px; }
  .item-qty { font-size: 13px; color: #999; text-align: right; min-width: 100px; flex-shrink: 0; }
  .item.checked .item-qty { color: #ccc; }

  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e5e5e0; padding: 10px 20px; display: flex; gap: 10px; }
  .reset-btn { flex: 1; background: transparent; border: 1px solid #e0e0dc; border-radius: 10px; padding: 10px; font-size: 13px; color: #999; cursor: pointer; }
  .reset-btn:active { background: #f5f5f3; }

  @media (min-width: 600px) {
    body { max-width: 480px; margin: 0 auto; box-shadow: 0 0 40px rgba(0,0,0,0.08); min-height: 100vh; background: #fff; }
    body::before { content: ''; display: block; position: fixed; inset: 0; background: #ebebea; z-index: -1; }
    .bottom-bar { max-width: 480px; left: 50%; transform: translateX(-50%); }
  }
</style>

  Anleitung: siehe README oder Kommentare im Code.

<div class="filter-bar" id="filter-bar"></div>
<div class="list" id="list"></div>

  { id:'g1',  name:'Wasser still 1,5 l',               qty:'2 Träger (6er)', cat:'getraenke',   aisle:'Getränke' },
  { id:'g2',  name:'Wasser sprudel 1,5 l',             qty:'1 Träger (6er)', cat:'getraenke',   aisle:'Getränke' },
  { id:'g3',  name:'Cola & Fanta',                      qty:'4–6 Flaschen',   cat:'getraenke',   aisle:'Getränke' },
  { id:'g4',  name:'Eistee',                            qty:'3 Flaschen',     cat:'getraenke',   aisle:'Getränke' },
  { id:'g5',  name:'Weizenbier',                        qty:'1 Kasten',       cat:'getraenke',   aisle:'Getränke' },
  { id:'g6',  name:'Radler',                            qty:'12 Flaschen',    cat:'getraenke',   aisle:'Getränke' },
  // GRILLZUBEHÖR
  { id:'z1',  name:'Holzkohle / Briketts',              qty:'5 kg',           cat:'grill',       aisle:'Grillzubehör' },
  { id:'z2',  name:'Grillanzünder',                     qty:'1 Päckchen',     cat:'grill',       aisle:'Grillzubehör' },
];

const aisleOrder = ['Obst & Gemüse','Fleisch & Käse','Kühlregal','Brot & Backwaren','Trockenwaren','Saucen & Konserven','Getränke','Grillzubehör'];
const filters = [
  { id:'alle', label:'Alle' },
  { id:'grill', label:'Grill' },
  { id:'salat', label:'Salat' },
  { id:'cold', label:'Brot & Aufschnitt' },
  { id:'fruehstueck', label:'Frühstück' },
  { id:'snack', label:'Snacks' },
  { id:'getraenke', label:'Getränke' },
];

let checked = {};
let activeFilter = 'alle';
let db = null;
let dbRef = null;

function setSyncBadge(state) {
  const b = document.getElementById('sync-badge');
  const states = {
    connecting: ['Verbinden…', ''],
    live:       ['● Live', ''],
    saving:     ['Speichern…', 'syncing'],
    error:      ['Offline', 'error'],
  };
  const [text, cls] = states[state] || states.connecting;
  b.textContent = text;
  b.className = 'sync-badge' + (cls ? ' ' + cls : '');
}

function buildFilters() {
  document.getElementById('filter-bar').innerHTML = filters.map(f =>
    `<button class="fbtn${f.id===activeFilter?' active':''}" onclick="setFilter('${f.id}')">${f.label}</button>`
  ).join('');
}

window.setFilter = function(f) {
  activeFilter = f;
  buildFilters();
  render();
};

window.resetAll = function() {
  if (!confirm('Alle Häkchen entfernen?')) return;
  checked = {};
  render();
  if (db) set(dbRef, {});
};

window.toggle = function(id) {
  checked[id] = !checked[id];
  if (!checked[id]) delete checked[id];
  render();
  if (db) {
    setSyncBadge('saving');
    const upd = {};
    upd[id] = checked[id] ? true : null;
    update(dbRef, upd).then(() => setSyncBadge('live')).catch(() => setSyncBadge('error'));
  }
};

function render() {
  const filtered = activeFilter === 'alle' ? items : items.filter(it => it.cat === activeFilter);
  const unchecked = filtered.filter(it => !checked[it.id]);
  const done      = filtered.filter(it =>  checked[it.id]);
  const sorted    = [...unchecked, ...done];

  const totalDone = items.filter(it => checked[it.id]).length;
  const pct = items.length ? Math.round(totalDone / items.length * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = totalDone + ' von ' + items.length + ' erledigt';

  const aislesInView = activeFilter === 'alle'
    ? aisleOrder
    : [...new Set(filtered.map(it => it.aisle))];

  let html = '';
  aislesInView.forEach(aisle => {
    const aisleItems = sorted.filter(it => it.aisle === aisle);
    if (!aisleItems.length) return;
    html += `<div class="section-label">${aisle}</div>`;
    aisleItems.forEach(it => {
      const isDone = !!checked[it.id];
      html += `<div class="item${isDone?' checked':''}" onclick="toggle('${it.id}')">
        <div class="check"><div class="check-mark"></div></div>
        <div class="item-info">
          <div class="item-name">${it.name}</div>
          ${it.note ? `<div class="item-note">⏰ ${it.note}</div>` : ''}
        </div>
        <div class="item-qty">${it.qty}</div>
      </div>`;
    });
  });
  document.getElementById('list').innerHTML = html;
}

async function init() {
  buildFilters();
  render();

  if (!IS_CONFIGURED) {
    document.getElementById('setup-banner').style.display = 'block';
    setSyncBadge('error');
    return;
  }

  try {
    const app = initializeApp(FIREBASE_CONFIG);
    db = getDatabase(app);
    dbRef = ref(db, 'jga/checked');

    onValue(dbRef, (snapshot) => {
      checked = snapshot.val() || {};
      render();
      setSyncBadge('live');
    }, (err) => {
      console.error(err);
      setSyncBadge('error');
    });

    setSyncBadge('connecting');
  } catch(e) {
    console.error(e);
    setSyncBadge('error');
  }
}

init();
</script>
